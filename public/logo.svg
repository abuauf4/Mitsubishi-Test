<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .mitsubishi-diamond { fill: #E60012; }
    </style>
  </defs>
  <rect width="100" height="100" fill="white" rx="0"/>
  <!-- Mitsubishi Three Diamond Logo -->
  <!-- The three diamonds share a central point and are arranged in a pinwheel pattern -->
  <g transform="translate(50, 50)">
    <!-- Top diamond -->
    <polygon class="mitsubishi-diamond" points="0,-38 -14,-12 0,0 14,-12"/>
    <!-- Bottom-right diamond -->
    <polygon class="mitsubishi-diamond" points="14,-12 0,0 14,26 28,0"/>
    <!-- Bottom-left diamond -->
    <polygon class="mitsubishi-diamond" points="-14,-12 0,0 -14,26 -28,0"/>
  </g>
</svg>